name: Mobile

# Builds the iOS and Android versions of the app. These are separate from
# build.yml because they need a very different toolchain per platform and
# produce UNSIGNED builds (no Apple Developer account or Android keystore
# is configured yet):
#   - iOS:     `tauri ios build --no-sign` — compiles and archives, but the
#              result can't be installed on a real device without a dev
#              team + certificate. Good for verifying the app still builds
#              for iOS; not distributable yet.
#   - Android: `tauri android build --apk --split-per-abi --debug` — debug
#              APKs, auto-signed by Gradle's built-in debug keystore, one
#              per CPU architecture (arm64, arm, x86, x86_64) instead of a
#              single "fat" universal APK. By default `--apk` bundles all
#              four architectures' native libraries into one file, which is
#              why builds were 400MB+; `--split-per-abi` is Tauri's
#              documented fix for exactly this (see
#              https://v2.tauri.app/distribute/google-play/#separate-bundles-per-architecture).
#              Each split APK is directly installable on a matching Android
#              device/emulator with "install unknown apps" allowed.
#              We also build a universal debug AAB (`--aab`, no split — AAB
#              is meant for Google Play, which does its own per-device
#              splitting) so an Android App Bundle is available alongside
#              the APKs once Play Store distribution is set up.
#
# To get real, distributable builds later:
#   - iOS: add an Apple Developer Team ID as the APPLE_DEVELOPMENT_TEAM repo
#     secret (plus a signing certificate + provisioning profile in the
#     keychain), then drop --no-sign.
#   - Android: add a release signingConfig (keystore + passwords as repo
#     secrets) to src-tauri/gen/android, then build without --debug. A
#     release build will also shrink further via minification/resource
#     shrinking, which debug builds intentionally skip.
#
# Only runs on workflow_dispatch or a v* tag (not every push to main) since
# mobile toolchain setup is heavier and newer than the desktop pipeline.
# Pushing a v* tag also attaches both builds to that tag's GitHub Release,
# same as the desktop installers in build.yml.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ios:
    name: Build (iOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Install frontend dependencies
        run: npm install

      - name: Init iOS project
        run: npm run tauri ios init -- --ci

      - name: Build unsigned iOS app
        run: npm run tauri ios build -- --ci --no-sign

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: self-jp-app-ios-unsigned
          path: |
            src-tauri/gen/apple/build/**/*.ipa
            src-tauri/gen/apple/build/**/*.app
          if-no-files-found: warn

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/gen/apple/build/**/*.ipa
          fail_on_unmatched_files: false

  android:
    name: Build (Android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          add-to-path: false

      - name: Set NDK env vars
        run: |
          echo "NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        run: npm install

      - name: Init Android project
        run: npm run tauri android init -- --ci

      - name: Build unsigned debug APKs (split per ABI)
        run: npm run tauri android build -- --ci --apk --split-per-abi --debug

      - name: Build unsigned debug AAB (universal)
        run: npm run tauri android build -- --ci --aab --debug

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: self-jp-app-android-debug-apk
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: self-jp-app-android-debug-aab
          path: src-tauri/gen/android/app/build/outputs/bundle/**/*.aab
          if-no-files-found: warn

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/**/*.aab
          fail_on_unmatched_files: true
